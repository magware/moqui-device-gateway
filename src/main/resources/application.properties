quarkus.log.category."org.apache.camel.component.paho".level=WARN
quarkus.log.category."io.agroal".level=WARN
quarkus.log.console.async.enabled=true
quarkus.log.console.async.queue-length=4096
quarkus.log.console.async.overflow=discard
quarkus.log.file.enabled=true
quarkus.log.file.path=logs/moqui-device-gateway.log
quarkus.log.file.async.enabled=true
quarkus.log.file.async.queue-length=8192
quarkus.log.file.async.overflow=discard
quarkus.log.file.rotation.max-file-size=25M
quarkus.log.file.rotation.max-backup-index=8
