# =============================================================================
# Moqui Device Gateway — Quarkus standard configuration for the standalone gateway.
# =============================================================================

# -----------------------------------------------------------------------------
# HTTP server
# -----------------------------------------------------------------------------
quarkus.http.port=8081
quarkus.http.host=0.0.0.0

# -----------------------------------------------------------------------------
# REST API security
# -----------------------------------------------------------------------------
gateway.api.auth.enabled=true
gateway.api.auth.header=X-API-Key
gateway.api.auth.token=change-me-in-production

# -----------------------------------------------------------------------------
# DataSource — default (production Moqui DB: DEVICE_REQUEST, PARAMETER, DEVICE_CONFIG, …)
# -----------------------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/moqui
quarkus.datasource.username=moqui
quarkus.datasource.password=moqui
quarkus.datasource.jdbc.min-size=2
quarkus.datasource.jdbc.max-size=10
quarkus.datasource.jdbc.acquisition-timeout=2S
camel.sql.datasource=moquiDataSource

# -----------------------------------------------------------------------------
# DataSource "log" — telemetry DB (PARAMETER_LOG, DEVICE_LOG)
# During standalone testing both datasources can point to the same DB.
# In production point this to a separate time-series/telemetry database.
# Env var overrides: QUARKUS_DATASOURCE_LOG_JDBC_URL, QUARKUS_DATASOURCE_LOG_USERNAME, …
# -----------------------------------------------------------------------------
quarkus.datasource.log.db-kind=postgresql
quarkus.datasource.log.jdbc.url=jdbc:postgresql://localhost:5432/moqui
quarkus.datasource.log.username=moqui
quarkus.datasource.log.password=moqui
quarkus.datasource.log.jdbc.min-size=1
quarkus.datasource.log.jdbc.max-size=8
quarkus.datasource.log.jdbc.acquisition-timeout=2S
camel.sql.log.datasource=moquiLogDataSource

# -----------------------------------------------------------------------------
# Gateway logical identity
# The gateway process is represented by a PhysicalDevice in moqui-device and is
# assigned to DeviceGroup rows through DeviceGroupMember with
# purposeEnumId = DgmpEdgeGateway.
# Dynamic subscription routes are restored from DB for the configured gateway.
# -----------------------------------------------------------------------------
gateway.device.id=

# -----------------------------------------------------------------------------
# Gateway request metadata SQL
# -----------------------------------------------------------------------------
gateway.request.sql=\
    SELECT dr.REQUEST_NAME, dr.DEVICE_ID, dr.PARENT_REQUEST_NAME, dr.REQUEST_TYPE_ENUM_ID, \
        dr.PURPOSE_ENUM_ID, dr.ROUTER_ENUM_ID, dr.CONNECTION_NAME, dr.BROKER_URI, \
        dr.TIMEOUT, dr.POLLING_INTERVAL, dr.QUERY, dr.ONLY_CHANGED_PARAMETERS, \
        dc.DRIVER_ENUM_ID, driver.ENUM_CODE AS DRIVER_ENUM_CODE, \
        dc.TRANSPORT_ENUM_ID, transport.ENUM_CODE AS TRANSPORT_ENUM_CODE, \
        dc.TRANSPORT_CONFIG, dc.OPTIONS \
    FROM DEVICE_REQUEST dr \
    LEFT JOIN DEVICE_CONNECTION dc ON dc.CONNECTION_NAME = dr.CONNECTION_NAME \
    LEFT JOIN ENUMERATION driver ON driver.ENUM_ID = dc.DRIVER_ENUM_ID \
    LEFT JOIN ENUMERATION transport ON transport.ENUM_ID = dc.TRANSPORT_ENUM_ID \
    WHERE dr.REQUEST_NAME = ?
gateway.request.items.sql=\
    SELECT dri.SEQUENCE_NUM, dri.PARAMETER_ID, \
        p.NUMERIC_VALUE, p.SYMBOLIC_VALUE, p.PARAMETER_ENUM_ID, \
        COALESCE(dri.QUERY, dr.QUERY) AS TARGET_QUERY \
    FROM DEVICE_REQUEST dr \
    INNER JOIN DEVICE_REQUEST_ITEM dri ON dr.REQUEST_NAME = dri.REQUEST_NAME \
    INNER JOIN PARAMETER p ON p.PARAMETER_ID = dri.PARAMETER_ID \
    LEFT JOIN ENTITY_AUDIT_LOG eal \
        ON eal.PK_PRIMARY_VALUE = dri.PARAMETER_ID \
        AND eal.CHANGED_ENTITY_NAME = 'moqui.math.Parameter' \
        AND eal.CHANGED_DATE > dr.LAST_UPDATED_STAMP \
    WHERE dr.REQUEST_NAME = ? \
        AND (dr.REQUEST_TYPE_ENUM_ID <> 'DrtWrite' \
            OR dr.ONLY_CHANGED_PARAMETERS <> 'Y' \
            OR eal.PK_PRIMARY_VALUE IS NOT NULL) \
    ORDER BY dri.SEQUENCE_NUM, dri.PARAMETER_ID

# -----------------------------------------------------------------------------
# MQTT write DeviceRequest route
# -----------------------------------------------------------------------------
mqtt.write.sql.query=\
    SELECT DISTINCT \
        dri.SEQUENCE_NUM as "sequenceNum", dri.PARAMETER_ID as "parameterId", \
        p.NUMERIC_VALUE as "numericValue", p.SYMBOLIC_VALUE as "symbolicValue", \
        p.PARAMETER_ENUM_ID as "parameterEnumId", dr.BROKER_URI as "brokerUri", \
        COALESCE(dri.QUERY, dr.QUERY) as "targetQuery" \
    FROM DEVICE_REQUEST dr \
    INNER JOIN DEVICE_REQUEST_ITEM dri ON dr.REQUEST_NAME = dri.REQUEST_NAME \
    INNER JOIN PARAMETER p ON p.PARAMETER_ID = dri.PARAMETER_ID \
    LEFT JOIN ENTITY_AUDIT_LOG eal \
        ON eal.PK_PRIMARY_VALUE = dri.PARAMETER_ID \
        AND eal.CHANGED_ENTITY_NAME = 'moqui.math.Parameter' \
        AND eal.CHANGED_DATE > dr.LAST_UPDATED_STAMP \
    WHERE dr.REQUEST_NAME = :#requestName \
        AND (dr.REQUEST_TYPE_ENUM_ID <> 'DrtWrite' \
            OR dr.ONLY_CHANGED_PARAMETERS <> 'Y' \
            OR eal.PK_PRIMARY_VALUE IS NOT NULL) \
    ORDER BY "sequenceNum"
mqtt.write.fetch.uri=sql:{{mqtt.write.sql.query}}?dataSource=#{{camel.sql.datasource}}
mqtt.write.afterPublish.enabled=true
mqtt.write.afterPublish.uri=seda:mqtt-write-device-request-audit?size=1000&blockWhenFull=false&discardWhenFull=true&waitForTaskToComplete=Never

# -----------------------------------------------------------------------------
# MQTT read DeviceRequest route
# -----------------------------------------------------------------------------
mqtt.read.route.autoStartup=true
mqtt.read.consume.uri=seda:mqtt-read-device-request-in
mqtt.read.store.log.uri=\
    sql:INSERT INTO PARAMETER_LOG \
        (PARAMETER_LOG_ID, PARAMETER_ID, SEQUENCE_NUM, OBSERVED_DATE, \
         NUMERIC_VALUE, SYMBOLIC_VALUE, PARAMETER_ENUM_ID) \
    VALUES \
        (:#parameterLogId, :#parameterId, :#sequenceNum, \
         COALESCE(:#observedDate, CURRENT_TIMESTAMP), \
         :#numericValue, :#symbolicValue, :#parameterEnumId)\
    ?batch=true&dataSource=#{{camel.sql.log.datasource}}
mqtt.read.store.parameter.uri=\
    sql:INSERT INTO PARAMETER \
        (PARAMETER_ID, NUMERIC_VALUE, SYMBOLIC_VALUE, PARAMETER_ENUM_ID, LAST_UPDATED_STAMP) \
    VALUES \
        (:#parameterId, :#numericValue, :#symbolicValue, :#parameterEnumId, CURRENT_TIMESTAMP) \
    ON CONFLICT (PARAMETER_ID) DO UPDATE SET \
        NUMERIC_VALUE = COALESCE(EXCLUDED.NUMERIC_VALUE, PARAMETER.NUMERIC_VALUE), \
        SYMBOLIC_VALUE = COALESCE(EXCLUDED.SYMBOLIC_VALUE, PARAMETER.SYMBOLIC_VALUE), \
        PARAMETER_ENUM_ID = COALESCE(EXCLUDED.PARAMETER_ENUM_ID, PARAMETER.PARAMETER_ENUM_ID), \
        LAST_UPDATED_STAMP = CURRENT_TIMESTAMP\
    ?batch=true&dataSource=#{{camel.sql.datasource}}
mqtt.read.afterStore.enabled=true
mqtt.read.afterStore.uri=seda:mqtt-read-device-request-notify?size=1000&blockWhenFull=false&discardWhenFull=true&waitForTaskToComplete=Never

# -----------------------------------------------------------------------------
# OPC UA write DeviceRequest route
# Note: the route implementation is now bean-driven and uses Camel Milo endpoint
# URIs built from DeviceConnection + DeviceRequestItem.query at runtime.
# -----------------------------------------------------------------------------
opcua.write.afterPublish.enabled=true
opcua.write.afterPublish.uri=seda:opcua-write-device-request-audit?size=1000&blockWhenFull=false&discardWhenFull=true&waitForTaskToComplete=Never

# -----------------------------------------------------------------------------
# OPC UA read DeviceRequest route
# -----------------------------------------------------------------------------
opcua.read.route.autoStartup=false
opcua.read.consume.uri=seda:opcua-read-device-request-in
opcua.read.store.log.uri=\
    sql:INSERT INTO PARAMETER_LOG \
        (PARAMETER_LOG_ID, PARAMETER_ID, SEQUENCE_NUM, OBSERVED_DATE, \
         NUMERIC_VALUE, SYMBOLIC_VALUE, PARAMETER_ENUM_ID) \
    VALUES \
        (:#parameterLogId, :#parameterId, :#sequenceNum, \
         COALESCE(:#observedDate, CURRENT_TIMESTAMP), \
         :#numericValue, :#symbolicValue, :#parameterEnumId)\
    ?batch=true&dataSource=#{{camel.sql.log.datasource}}
opcua.read.store.parameter.uri=\
    sql:INSERT INTO PARAMETER \
        (PARAMETER_ID, NUMERIC_VALUE, SYMBOLIC_VALUE, PARAMETER_ENUM_ID, LAST_UPDATED_STAMP) \
    VALUES \
        (:#parameterId, :#numericValue, :#symbolicValue, :#parameterEnumId, CURRENT_TIMESTAMP) \
    ON CONFLICT (PARAMETER_ID) DO UPDATE SET \
        NUMERIC_VALUE = COALESCE(EXCLUDED.NUMERIC_VALUE, PARAMETER.NUMERIC_VALUE), \
        SYMBOLIC_VALUE = COALESCE(EXCLUDED.SYMBOLIC_VALUE, PARAMETER.SYMBOLIC_VALUE), \
        PARAMETER_ENUM_ID = COALESCE(EXCLUDED.PARAMETER_ENUM_ID, PARAMETER.PARAMETER_ENUM_ID), \
        LAST_UPDATED_STAMP = CURRENT_TIMESTAMP\
    ?batch=true&dataSource=#{{camel.sql.datasource}}
opcua.read.afterStore.enabled=true
opcua.read.afterStore.uri=seda:opcua-read-device-request-notify?size=1000&blockWhenFull=false&discardWhenFull=true&waitForTaskToComplete=Never

# -----------------------------------------------------------------------------
# Export DeviceConfig route
# -----------------------------------------------------------------------------
device.config.export.sql.query=\
    SELECT \
        drs.RULE_SET_NAME AS "ruleSetName", \
        dr.PRIORITY AS "priority", \
        COALESCE( \
            NULLIF(MAX(dri.REQUEST_ITEM_NAME), ''), \
            NULLIF(p.PARAMETER_ALIAS, ''), \
            COALESCE(phdev.DEVICE_NAME, dr.DEVICE_ID) || '.' || pd.PARAMETER_NAME \
        ) AS "parameterName", \
        CASE \
            WHEN p.NUMERIC_VALUE     IS NOT NULL THEN CAST(p.NUMERIC_VALUE AS VARCHAR(50)) \
            WHEN p.PARAMETER_ENUM_ID IS NOT NULL THEN p.PARAMETER_ENUM_ID \
            ELSE p.SYMBOLIC_VALUE \
        END AS "parameterValue" \
    FROM DEVICE_RULE_SET drs \
    INNER JOIN DEVICE_RULE dr ON drs.DEVICE_RULE_SET_ID = dr.DEVICE_RULE_SET_ID \
    INNER JOIN DEVICE_CONFIG dc ON dr.DEVICE_CONFIG_ID = dc.DEVICE_CONFIG_ID \
    LEFT JOIN PHYSICAL_DEVICE phdev ON phdev.DEVICE_ID = dr.DEVICE_ID \
    INNER JOIN PARAMETER p ON dc.DEVICE_CONFIG_ID = p.DEVICE_CONFIG_ID \
    INNER JOIN PARAMETER_DEF pd ON p.PARAMETER_DEF_ID = pd.PARAMETER_DEF_ID \
    LEFT JOIN DEVICE_REQUEST_ITEM dri ON dri.PARAMETER_ID = p.PARAMETER_ID \
    WHERE drs.DEVICE_RULE_SET_ID = :#deviceRuleSetId \
        AND (CAST(:#deviceId AS VARCHAR) IS NULL OR dr.DEVICE_ID = :#deviceId) \
        AND (CAST(:#deviceRuleId AS VARCHAR) IS NULL OR dr.DEVICE_RULE_ID = :#deviceRuleId) \
    GROUP BY drs.RULE_SET_NAME, dr.PRIORITY, p.PARAMETER_ID, p.PARAMETER_ALIAS, \
             p.NUMERIC_VALUE, p.PARAMETER_ENUM_ID, p.SYMBOLIC_VALUE, \
             phdev.DEVICE_NAME, dr.DEVICE_ID, pd.PARAMETER_NAME, pd.PARAMETER_CODE \
    ORDER BY dr.PRIORITY, phdev.DEVICE_NAME, pd.PARAMETER_CODE
device.config.export.fetch.uri=sql:{{device.config.export.sql.query}}?dataSource=#{{camel.sql.datasource}}
file.transfer.uri=seda:export-device-config-out?waitForTaskToComplete=Never
file.transfer.uri.2.enabled=false
file.transfer.uri.2=seda:export-device-config-out-2?size=1000&blockWhenFull=false&discardWhenFull=true&waitForTaskToComplete=Never

