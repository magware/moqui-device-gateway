# -----------------------------------------------------------------------------
# PLC diagnostic log route (CODESYS LoggerFacade batch format → PARAMETER_LOG)
# The plc-log-ingest route transforms the IEC 61131 numbered-object format,
# ensures PARAMETER_DEF + PARAMETER rows, then delegates to store-device-request-inbound.
# Override plc.log.consume.uri via the integration/local profile or production overrides.
# -----------------------------------------------------------------------------
plc.log.route.autoStartup=false
plc.log.consume.uri=seda:plc-log-in
plc.log.store.ensure.parameter.def.uri=\
    sql:INSERT INTO PARAMETER_DEF \
        (PARAMETER_DEF_ID, PARAMETER_TYPE_ENUM_ID, PARAMETER_CODE, PARAMETER_NAME) \
    VALUES \
        ('PlcLoggerDef', 'PtTextShort', 'PLC-LOG', 'PLC Logger') \
    ON CONFLICT (PARAMETER_DEF_ID) DO NOTHING\
    ?dataSource=#{{camel.sql.log.datasource}}
plc.log.store.ensure.parameter.uri=\
    sql:INSERT INTO PARAMETER (PARAMETER_ID, PARAMETER_DEF_ID) \
    VALUES (:#parameterId, 'PlcLoggerDef') \
    ON CONFLICT (PARAMETER_ID) DO NOTHING\
    ?batch=true&dataSource=#{{camel.sql.log.datasource}}
plc.log.store.device.log.uri=\
    sql:INSERT INTO DEVICE_LOG \
        (DEVICE_LOG_ID, DEVICE_ID, PAYLOAD, SEQUENCE_NUM, OBSERVED_DATE) \
    VALUES \
        (:#deviceLogId, :#deviceId, :#payload, :#sequenceNum, \
         COALESCE(:#observedDate, CURRENT_TIMESTAMP))\
    ?batch=true&dataSource=#{{camel.sql.log.datasource}}

# -----------------------------------------------------------------------------
# Inbound error notification
# Sends a REST callback to Moqui when a read route fails to persist data to
# PARAMETER or PARAMETER_LOG continuously for longer than the threshold.
# Reads always continue — they are never blocked by storage failures.
# Set notification.uri to a Camel endpoint (e.g. http://moqui-server:8080/rest/...).
# Leave blank to log-only without sending a remote notification.
# -----------------------------------------------------------------------------
gateway.inbound.error.notification.enabled=true
gateway.inbound.error.notification.threshold.seconds=60
gateway.inbound.error.notification.uri=

