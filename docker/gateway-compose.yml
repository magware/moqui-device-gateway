services:
  moqui-device-gateway:
    image: moqui-device-gateway:latest
    container_name: moqui-device-gateway
    restart: unless-stopped
    ports:
      - 127.0.0.1:8081:8081
    environment:
      # Activate the integration profile
      QUARKUS_PROFILE: integration
      # DB for standalone testing: reach the sibling moqui-log-database container.
      # In production replace with the main Moqui DB, e.g.:
      #   QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://moqui-database:5432/moqui
      # The Moqui entity engine creates all required tables (PARAMETER, PARAMETER_LOG,
      # DEVICE_REQUEST, etc.) on startup — no manual schema init is needed.
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://moqui-log-database:5432/moqui
      # MQTT: use the host LAN IP (192.168.101.62 = fmlab4) so 'localhost' inside
      # the container does not resolve to the container itself
      MQTT_READ_CONSUME_URI: "paho-mqtt5:iot/parameters/in?brokerUrl=tcp://192.168.101.62:1883&clientId=camel-gateway-in&userName=artemis&password=artemis"
      MQTT_WRITE_PUBLISH_URI: "paho-mqtt5:iot/parameters/out?brokerUrl=tcp://192.168.101.62:1883&clientId=camel-gateway-out&userName=artemis&password=artemis"
      PLC_LOG_CONSUME_URI: "paho-mqtt5:moqui-plc?brokerUrl=tcp://192.168.101.62:1883&clientId=camel-plc-log-in&userName=artemis&password=artemis"
    volumes:
      - ./gateway-data:/deployments/data
      - ./gateway-logs:/deployments/logs
    networks:
      - moqui-gateway-net
    depends_on:
      moqui-log-database:
        condition: service_healthy

networks:
  moqui-gateway-net:
    name: moqui-gateway-net
    external: true
