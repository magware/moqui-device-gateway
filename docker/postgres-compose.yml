# PostgreSQL for moqui-device-gateway simple installs and tests.
#
# Run with:
#   docker compose -f docker/postgres-compose.yml -p moqui-gateway up -d
#
# This Compose file initializes the local test database automatically with:
#   - src/test/resources/db/init.sql
#   - src/test/resources/device-gateway-seed.sql
#   - src/test/resources/device-gateway-opcua-seed.sql
#
# The seed templates are expanded at first container initialization using the
# environment variables below. Remove the named volume if you want the init
# sequence to run again from scratch.
#
# This creates the named network `moqui-gateway-net` used by
# `device-gateway-compose.yml`.

services:
  moqui-database:
    image: postgres:18.1
    container_name: moqui-gateway-database
    restart: always
    ports:
      - 127.0.0.1:5432:5432
    volumes:
      # PostgreSQL 18+ official images declare VOLUME /var/lib/postgresql
      # and use version-specific PGDATA paths such as /var/lib/postgresql/18/docker.
      # Keep this mount when using PostgreSQL 18+.
      - moqui-gateway-postgres-data:/var/lib/postgresql
      - ../src/test/resources/db/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
      - ../src/test/resources/device-gateway-seed.sql:/docker-entrypoint-initdb.d/10-device-gateway-seed.sql.template:ro
      - ../src/test/resources/device-gateway-opcua-seed.sql:/docker-entrypoint-initdb.d/20-device-gateway-opcua-seed.sql.template:ro
      - ./initdb/30-load-gateway-fixtures.sh:/docker-entrypoint-initdb.d/30-load-gateway-fixtures.sh:ro
    environment:
      POSTGRES_DB: moqui
      POSTGRES_DB_SCHEMA: public
      POSTGRES_USER: moqui
      POSTGRES_PASSWORD: moqui
      GATEWAY_SEED_SUFFIX: "01"
      GATEWAY_MQTT_PUBLISH_BASE_URI: "paho-mqtt5:?brokerUrl=tcp://localhost:1883&userName=artemis&password=artemis"
      GATEWAY_MQTT_SUBSCRIBE_BASE_URI: "paho-mqtt5:?brokerUrl=tcp://localhost:1883&userName=artemis&password=artemis"
      GATEWAY_OPCUA_TRANSPORT_CONFIG: "host.docker.internal:12686/milo"
      GATEWAY_OPCUA_FEEDBACK_NODE: "ns=2;s=virtual_plc_feedback"
      GATEWAY_OPCUA_FAULT_NODE: "ns=2;s=virtual_plc_fault"
      GATEWAY_OPCUA_REFERENCE_WRITE_NODE: "ns=2;s=virtual_plc_reference_write"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moqui -d moqui"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      moqui-gateway-net:
        aliases:
          - moqui-database

volumes:
  moqui-gateway-postgres-data:

networks:
  moqui-gateway-net:
    name: moqui-gateway-net
